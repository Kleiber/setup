<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Countdown Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        #countdown {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 90vw;
            height: 50vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 1vw;
        }
        .time-value {
            font-size: 8vw;
            font-weight: 700;
            line-height: 1;
            width: 18vw;
            height: 18vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            color: #333333;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .time-value:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        .time-label {
            font-size: 1.2vw;
            font-weight: 400;
            text-transform: uppercase;
            margin-top: 1vw;
            color: #4a4a4a;
            letter-spacing: 0.15em;
            text-align: center;
            padding: 0.5vw 1vw;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .time-unit:hover .time-label {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(5px);
        }
        #playButton {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #b2090e;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        #playButton:hover {
            background-color: #b2090e;
            transform: translate(-50%, -50%) scale(1.05);
        }
        #playButton::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 30px solid white;
            margin-left: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 3;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin: 0;
            font-size: 3vw;
            color: #333;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>
    <div id="countdown">
        <div class="time-unit">
            <div class="time-value" id="days">00</div>
            <div class="time-label">Dias</div>
        </div>
        <div class="time-unit">
            <div class="time-value" id="hours">00</div>
            <div class="time-label">Horas</div>
        </div>
        <div class="time-unit">
            <div class="time-value" id="minutes">00</div>
            <div class="time-label">Min</div>
        </div>
        <div class="time-unit">
            <div class="time-value" id="seconds">00</div>
            <div class="time-label">Seg</div>
        </div>
    </div>
    <div id="playButton"></div>
    <div id="anniversaryMessage" class="message">
        <h1>Feliz Aniversario</h1>
    </div>
    <div id="introductionMessage" class="message">
        <h1>Introducción</h1>
    </div>
    <div id="mainMessage" class="message">
        <h1>Gracias por todo!</h1>
    </div>
    <div id="photoGallery" class="message">
        <h1>Fotos</h1>
    </div>
    <div id="finalMessage" class="message">
        <h1>Te Amo!</h1>
    </div>

    <audio id="audio" src="audio/audio1.mp3"></audio>

    <script>
        const countdownElement = document.getElementById('countdown');
        const playButton = document.getElementById('playButton');
        const confettiCanvas = document.getElementById('confettiCanvas');
        const audio = document.getElementById('audio');

        const messages = [
            { element: document.getElementById('anniversaryMessage'), duration: 5000, confetti: true },
            { element: document.getElementById('introductionMessage'), duration: 5000, confetti: false },
            { element: document.getElementById('mainMessage'), duration: 5000, confetti: true },
            { element: document.getElementById('photoGallery'), duration: 5000, confetti: false },
            { element: document.getElementById('finalMessage'), duration: 5000, confetti: true }
        ];

        let confettiInterval;
        let isConfettiActive = false;

        function startConfetti() {
            if (isConfettiActive) return;

            isConfettiActive = true;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            confettiInterval = setInterval(function() {
                const particleCount = 50;
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 1000);
        }

        function stopConfetti() {
            if (!isConfettiActive) return;

            isConfettiActive = false;
            clearInterval(confettiInterval);
            confetti.reset();
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(countdownTimer);
                countdownElement.style.display = 'none';
                playButton.style.display = 'flex';
                startConfetti();
            }
        }

        const targetDate = new Date("2024-09-22T06:13:00").getTime();
        const countdownTimer = setInterval(updateCountdown, 1000);

        function showMessage(index) {
            messages.forEach((msg, i) => {
                msg.element.style.display = i === index ? 'block' : 'none';
            });

            if (messages[index].confetti) {
                startConfetti();
            } else {
                stopConfetti();
            }
        }

        playButton.addEventListener('click', function() {
            playButton.style.display = 'none';
            audio.play();

            let currentMessageIndex = 0;
            showMessage(currentMessageIndex);

            function nextMessage() {
                if (currentMessageIndex < messages.length - 1) {
                    currentMessageIndex++;
                    showMessage(currentMessageIndex);

                    setTimeout(nextMessage, messages[currentMessageIndex].duration);
                } else {
                    stopConfetti();
                    audio.pause();
                    audio.currentTime = 0;
                }
            }

            setTimeout(nextMessage, messages[currentMessageIndex].duration);
        });

        audio.addEventListener('ended', function() {
            audio.currentTime = 0;
            audio.play();
        });

        updateCountdown();
    </script>
</body>
</html>
